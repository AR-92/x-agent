<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatInput Component Demo</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      daisyui: {
        themes: ["light", "dark", "cupcake", "synthwave", "forest"],
      },
    }
  </script>
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .demo-container {
      flex: 1;
      padding: 2rem;
      padding-bottom: 250px;
    }
  </style>
</head>
<body class="bg-base-100 text-base-content">

  <!-- Demo Header -->
  <div class="navbar bg-base-200 shadow-lg">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl text-primary">ChatInput Component</a>
    </div>
    <div class="flex-none gap-2">
      <div class="dropdown dropdown-end">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm">
          Theme
          <i data-lucide="chevron-down" class="w-4 h-4"></i>
        </div>
        <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow-lg bg-base-200 rounded-box w-40 border border-base-300">
          <li><a onclick="setTheme('light')">Light</a></li>
          <li><a onclick="setTheme('dark')">Dark</a></li>
          <li><a onclick="setTheme('cupcake')">Cupcake</a></li>
          <li><a onclick="setTheme('synthwave')">Synthwave</a></li>
          <li><a onclick="setTheme('forest')">Forest</a></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Demo Content -->
  <div class="demo-container max-w-4xl mx-auto w-full">
    <h1 class="text-3xl font-bold mb-4 text-center text-base-content">ChatInput Component Demo</h1>
    <p class="text-center text-base-content/70 mb-8">A reusable, theme-aware chat input component with task management</p>

    <!-- Controls -->
    <div class="card bg-base-200 shadow-xl mb-6">
      <div class="card-body">
        <h2 class="card-title text-base-content">Controls</h2>
        
        <div class="form-control">
          <label class="label">
            <span class="label-text text-base-content">Placeholder Text</span>
          </label>
          <input type="text" id="placeholderInput" placeholder="Enter placeholder..." class="input input-bordered w-full text-base-content" value="Send message to Accelerator..." />
          <button class="btn btn-sm btn-primary mt-2" onclick="updatePlaceholder()">Update Placeholder</button>
        </div>

        <div class="form-control mt-4">
          <label class="label">
            <span class="label-text text-base-content">Add Task</span>
          </label>
          <div class="flex gap-2">
            <input type="text" id="taskInput" placeholder="Task description..." class="input input-bordered flex-1 text-base-content" />
            <select id="taskStatus" class="select select-bordered">
              <option value="pending">Pending</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
            </select>
            <button class="btn btn-sm btn-secondary" onclick="addTask()">Add</button>
          </div>
        </div>

        <div class="flex gap-2 mt-4">
          <button class="btn btn-sm btn-success" onclick="toggleTasks()">Toggle Tasks</button>
          <button class="btn btn-sm btn-error" onclick="clearTasks()">Clear Tasks</button>
          <button class="btn btn-sm btn-info" onclick="loadDemoTasks()">Load Demo Tasks</button>
        </div>

        <div class="form-control mt-4">
          <label class="label">
            <span class="label-text text-base-content">Set Value</span>
          </label>
          <input type="text" id="valueInput" placeholder="Set textarea value..." class="input input-bordered w-full text-base-content" />
          <button class="btn btn-sm btn-primary mt-2" onclick="setValue()">Set Value</button>
        </div>

        <div class="flex gap-2 mt-4">
          <button class="btn btn-sm btn-warning" onclick="setEnabled(false)">Disable</button>
          <button class="btn btn-sm btn-success" onclick="setEnabled(true)">Enable</button>
          <button class="btn btn-sm btn-info" onclick="focusInput()">Focus</button>
        </div>
      </div>
    </div>

    <!-- Events Log -->
    <div class="card bg-base-200 shadow-xl">
      <div class="card-body">
        <h2 class="card-title text-base-content">Events Log</h2>
        <div id="eventsLog" class="bg-base-300 rounded-box p-4 h-48 overflow-y-auto font-mono text-xs text-base-content">
          <div class="text-base-content/50">Events will appear here...</div>
        </div>
        <button class="btn btn-sm btn-ghost mt-2" onclick="clearLog()">Clear Log</button>
      </div>
    </div>
  </div>

  <!-- Chat Input Container -->
  <div id="chatInputContainer"></div>

  <!-- Import ChatInput Component -->
  <script type="module">
    import { ChatInput } from './ChatInput.js';

    // Initialize ChatInput
    window.chatInput = new ChatInput({
      container: document.getElementById('chatInputContainer'),
      placeholder: 'Send message to Accelerator...',
      onSend: (message) => {
        logEvent('onSend', message);
        // Simulate adding a response task
        setTimeout(() => {
          chatInput.addTask('Processing: ' + message.substring(0, 30) + '...', 'pending');
        }, 500);
      },
      onAttachment: () => {
        logEvent('onAttachment', 'Attachment button clicked');
        alert('Attachment button clicked!\n\nYou can implement file upload logic here.');
      },
      onVoice: () => {
        logEvent('onVoice', 'Voice button clicked');
        alert('Voice button clicked!\n\nYou can implement voice recording logic here.');
      },
      onPlus: () => {
        logEvent('onPlus', 'Plus button clicked');
        const taskText = prompt('Enter new task:');
        if (taskText) {
          chatInput.addTask(taskText, 'pending');
        }
      },
    });

    // Load demo tasks
    setTimeout(() => {
      window.chatInput.setTasks([
        { text: 'Analyze project requirements', status: 'completed' },
        { text: 'Set up React + TypeScript', status: 'completed' },
        { text: 'Deploy and present the landing page', status: 'active' },
      ]);
      logEvent('init', 'ChatInput initialized with demo tasks');
    }, 100);
  </script>

  <!-- Demo Scripts -->
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Theme switcher
    function setTheme(themeName) {
      document.documentElement.setAttribute('data-theme', themeName);
      logEvent('theme', `Theme changed to: ${themeName}`);
    }

    // Update placeholder
    function updatePlaceholder() {
      const text = document.getElementById('placeholderInput').value;
      window.chatInput.setPlaceholder(text);
      logEvent('updatePlaceholder', text);
    }

    // Add task
    function addTask() {
      const input = document.getElementById('taskInput');
      const status = document.getElementById('taskStatus').value;
      if (input.value.trim()) {
        window.chatInput.addTask(input.value.trim(), status);
        logEvent('addTask', `${input.value.trim()} (${status})`);
        input.value = '';
      }
    }

    // Toggle tasks visibility
    function toggleTasks() {
      window.chatInput.toggleTasksList();
      logEvent('toggleTasks', 'Tasks visibility toggled');
    }

    // Clear all tasks
    function clearTasks() {
      window.chatInput.clearTasks();
      logEvent('clearTasks', 'All tasks cleared');
    }

    // Load demo tasks
    function loadDemoTasks() {
      window.chatInput.setTasks([
        { text: 'Review code changes', status: 'completed' },
        { text: 'Run tests', status: 'completed' },
        { text: 'Update documentation', status: 'active' },
        { text: 'Deploy to production', status: 'pending' },
        { text: 'Monitor performance', status: 'pending' },
      ]);
      logEvent('loadDemoTasks', 'Loaded 5 demo tasks');
    }

    // Set textarea value
    function setValue() {
      const text = document.getElementById('valueInput').value;
      window.chatInput.setValue(text);
      logEvent('setValue', text);
    }

    // Enable/Disable
    function setEnabled(enabled) {
      window.chatInput.setEnabled(enabled);
      logEvent('setEnabled', enabled ? 'enabled' : 'disabled');
    }

    // Focus input
    function focusInput() {
      window.chatInput.focus();
      logEvent('focus', 'Input focused');
    }

    // Event logger
    function logEvent(eventType, data) {
      const logContainer = document.getElementById('eventsLog');
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.className = 'mb-1';
      logEntry.innerHTML = `<span class="text-base-content/50">[${timestamp}]</span> <span class="text-primary">${eventType}:</span> <span class="text-base-content">${escapeHtml(String(data))}</span>`;
      
      // Remove "Events will appear here..." if present
      if (logContainer.children[0]?.classList.contains('text-base-content/50')) {
        logContainer.innerHTML = '';
      }
      
      logContainer.appendChild(logEntry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    // Clear log
    function clearLog() {
      document.getElementById('eventsLog').innerHTML = '<div class="text-base-content/50">Events will appear here...</div>';
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Handle Enter key in task input
    document.getElementById('taskInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        addTask();
      }
    });

    // Handle Enter key in value input
    document.getElementById('valueInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        setValue();
      }
    });
  </script>
</body>
</html>
