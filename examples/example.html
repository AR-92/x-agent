<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>X-Agent Lite</title>
  <link rel="stylesheet" href="./assets/css/custom.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      daisyui: {
        themes: ["light", "dark", "cupcake", "bumblebee", "emerald", "corporate",
          "synthwave", "retro", "cyberpunk", "valentine", "halloween",
          "garden", "forest", "aqua", "lofi", "pastel", "fantasy",
          "wireframe", "black", "luxury", "dracula", "cmyk", "autumn",
          "business", "acid", "lemonade", "night", "coffee", "winter"],
      },
      theme: {},
    }
  </script>

</head>
<body class="bg-base-100 text-base-content min-h-screen font-sans antialiased">

<!-- Settings Modal Container -->
<div id="settingsModalContainer"></div>

<!-- App Container -->
<div class="flex h-screen overflow-hidden">
  <!-- Left Sidebar Container -->
  <div id="sidebarContainer"></div>
  
  <!-- Main Content -->
  <div id="mainContent" class="flex-1 flex flex-col overflow-hidden">
    <!-- Minimal Navbar -->
    <nav class="flex items-center justify-between px-2 py-1.5 border-b border-base-300 bg-base-100 shrink-0 h-9">
      <div class="flex items-center gap-1.5">
        <button id="menuBtn" class="btn btn-ghost btn-xs btn-circle h-6 w-6 min-h-0 rounded-btn hover:bg-base-300 lg:hidden">
          <i data-lucide="menu" class="w-3 h-3"></i>
        </button>
        <span class="text-xs font-medium text-base-content">x-agent</span>
      </div>
      <div class="flex items-center gap-1">
        <button id="panelToggle" class="btn btn-ghost btn-xs btn-circle h-6 w-6 min-h-0 rounded-btn hover:bg-base-300">
          <i data-lucide="panel-right" class="w-3 h-3"></i>
        </button>
      </div>
    </nav>

    <!-- Chat Messages Container -->
    <div id="chatMessagesContainer" class="flex-1 overflow-y-auto scrollbar-thin scrollbar-thumb-base-content/20 scrollbar-track-transparent"></div>

    <!-- Chat Input Container -->
    <div id="chatInputContainer" class="shrink-0"></div>
  </div>

  <!-- Right Panel Container -->
  <div id="rightPanelContainer"></div>
</div>

<script type="module" src="./lib/app.js"></script>
</body>
</html>
