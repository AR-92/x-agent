<!DOCTYPE html>
<html data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manus Lite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script>
    tailwind.config = {
      daisyui: {
        themes: ["light", "dark"],
      },
    }
  </script>
  <style>
    .theme-option {
      background: transparent !important;
      color: inherit !important;
      border-radius: var(--rounded-btn, 0.5rem) !important;
    }
    .theme-dropdown-list {
      display: flex !important;
      flex-direction: column !important;
      flex-wrap: nowrap !important;
    }
    .theme-dropdown-list > li {
      display: block !important;
      width: 100% !important;
    }
  </style>
</head>
<body class="bg-base-100 text-base-content min-h-screen font-sans antialiased">

<!-- Settings Modal Trigger -->
<button id="settingsTrigger" class="fixed top-4 right-4 z-50 w-10 h-10 rounded-btn bg-base-200 border border-base-300 shadow-md flex items-center justify-center cursor-pointer hover:bg-base-300 transition-all">
  <i data-lucide="settings" class="w-5 h-5"></i>
</button>

<!-- Settings Modal Container -->
<div id="settingsModalContainer"></div>

<!-- Right Side Panel Toggle Button -->
<button id="panelToggle" class="fixed top-4 right-20 z-40 w-10 h-10 rounded-btn bg-base-200 border border-base-300 shadow-md flex items-center justify-center text-base-content hover:bg-base-300 transition-all cursor-pointer">
  <i data-lucide="panel-right" class="w-5 h-5"></i>
</button>

<!-- Left Sidebar Container -->
<div id="sidebarContainer"></div>

<!-- Main Content -->
<div class="flex">
  <div id="mainContent" class="flex-1 transition-all duration-300">
    <!-- Chat Messages Container -->
    <div id="chatMessagesContainer"></div>
  </div>

  <!-- Right Panel Container -->
  <div id="rightPanelContainer"></div>
  <div id="resizeHandle" class="fixed top-0 right-0 w-1 h-full cursor-col-resize z-40 hidden hover:bg-base-content/10 rounded-l-btn"></div>
</div>

<!-- Gradient fade -->
<div class="fixed bottom-24 left-0 right-0 bg-gradient-to-t from-base-100 to-transparent h-12 pointer-events-none z-10"></div>

<!-- Chat Input Container -->
<div id="chatInputContainer"></div>

<script type="module">
  import { ChatInput } from './components/ChatInput.js';
  import { SettingsModal } from './components/SettingsModal.js';
  import { Sidebar } from './components/Sidebar.js';
  import { RightPanel } from './components/RightPanel.js';
  import { ChatMessages } from './components/ChatMessages.js';

  // Initialize Lucide icons for existing icons
  lucide.createIcons();

  // Initialize ChatMessages component
  const chatMessages = new ChatMessages({
    container: document.getElementById('chatMessagesContainer'),
    assistantName: 'Accelerator',
    messages: [
      {
        type: 'response',
        content: "I've carefully analyzed your request to build a comprehensive task management application.",
        items: [
          { type: 'badge', variant: 'success', icon: 'check', text: 'Analyzing project requirements' },
          { type: 'badge', variant: 'primary', icon: 'loader-2', text: 'Setting up React + TypeScript', animated: true },
        ],
      },
      {
        type: 'response',
        content: "I've designed a complete landing page with a modern aesthetic.",
        items: [
          { type: 'code', language: 'typescript', code: `interface HeroProps {\n  title: string;\n}` },
        ],
      },
      {
        type: 'response',
        content: "I've generated the complete project structure with all necessary files.",
        items: [
          { type: 'badge', variant: 'info', icon: 'file-code', text: 'src/components/Hero.tsx' },
          { type: 'badge', variant: 'info', icon: 'file-code', text: 'src/components/Navbar.tsx' },
          { type: 'badge', variant: 'warning', icon: 'file-type', text: 'tailwind.config.js' },
        ],
      },
      {
        type: 'response',
        content: "I encountered an issue during the build process.",
        items: [
          { type: 'alert', variant: 'error', title: 'Build Failed', message: 'Error: Module not found' },
          { type: 'badge', variant: 'primary', icon: 'package-plus', text: 'Installing react-router-dom', pulse: true },
        ],
      },
      {
        type: 'response',
        content: 'Let me analyze the requirements and determine the optimal architecture.',
        items: [
          {
            type: 'reasoning',
            title: 'Reasoning Process',
            steps: [
              { text: 'Evaluating data fetching strategy', loading: true },
              { text: 'Performance requirements assessed', icon: 'check-circle-2' },
            ],
          },
        ],
      },
      {
        type: 'response',
        content: 'Test suite completed successfully.',
        items: [
          {
            type: 'terminal',
            lines: [
              { text: '✓ PASS src/utils/format.test.ts', variant: 'text-success' },
              { text: '✓ PASS src/utils/date.test.ts', variant: 'text-success' },
              { text: '✓ PASS src/components/Button.test.tsx', variant: 'text-success' },
            ],
            footer: 'Tests: 12 passed, 0 failed',
          },
        ],
      },
      {
        type: 'response',
        content: "All tasks completed successfully!",
        items: [
          { type: 'badge', variant: 'success', icon: 'check-circle-2', text: 'Hero section completed' },
          { type: 'badge', variant: 'success', icon: 'check-circle-2', text: 'All tests passing' },
        ],
      },
    ],
  });

  // Initialize Sidebar component
  const sidebar = new Sidebar({
    container: document.getElementById('sidebarContainer'),
    logo: {
      src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="130 245 230 230"><g><path fill="rgb(158,40,181)" d="M118.928 304.856L87.648 296.786a12.5 12.5 0 00-6.12 0L-7.532 320.776C-14.2 319.566-16.792 322.136-16.792 325.306v19.18c0 3.54 3.24 6.06 6.66 5.18l120.14-31.19c3.84-1 7.62-2.3 11.26-3.84 2.86-1.21 4.64-4.1 4.4-7.22-.23-3.12-2.42-5.74-5.46-6.52z"/><path fill="rgb(158,40,181)" d="M155.968 137.909a12.5 12.5 0 00-9.55-2.91l-21.28.67c-7.01.22-14.03 1.23-20.86 3.01L-8.462 168.479c-10.71 2.79-20.586 8.39-28.586 16.24-1.65 1.63-3.17 3.24-4.48 4.84-1.62 1.92-2.15 4.52-1.38 6.91.76 2.39 2.69 4.22 5.13 4.84l30.115 7.77c3.12.8 6.4-.34 8.11-3.02 1.91-2.72 4.13-5.16 6.61-7.28 4.55-3.9 9.84-6.64 15.68-8.16l135.01-34.97c4.61-1.2 7.83-5.4 7.83-10.2 0-3.59-1.47-7.02-4.06-9.54z"/></g></svg>',
      alt: 'X-Agent',
      version: '1.0'
    },
    navigation: [
      { label: 'New Task', icon: 'plus', href: '#', active: true },
      { label: 'Explore', icon: 'compass', href: '#' },
      { label: 'Dashboard', icon: 'chart-no-axes-column-increasing', href: '#' },
      { label: 'Portfolio', icon: 'briefcase', href: '#' },
    ],
    tasksSection: {
      taskCount: 3,
      tasks: [
        { name: 'Project Alpha' },
        { name: 'Website Redesign' },
        { name: 'Mobile App' },
      ],
    },
    user: {
      name: 'User',
      avatar: null,
      plan: 'Pro',
      credits: 1479,
    },
    onNavigate: (item, index) => {
      console.log('Navigated to:', item.label);
    },
  });

  // Initialize RightPanel component
  const rightPanel = new RightPanel({
    container: document.getElementById('rightPanelContainer'),
    title: 'Response Details',
    codePreview: {
      title: 'Code Preview',
      code: `import { useState } from 'react';

function Hero() {
  return (
    <div className="hero">
    </div>
  );
}`,
    },
    projectStructure: {
      title: 'Project Structure',
      files: [
        { name: 'src/', type: 'folder', indent: 0 },
        { name: 'components/', type: 'folder', indent: 1 },
        { name: 'Hero.tsx', type: 'tsx', indent: 2 },
        { name: 'Navbar.tsx', type: 'tsx', indent: 2 },
        { name: 'App.tsx', type: 'tsx', indent: 1 },
        { name: 'index.css', type: 'css', indent: 1 },
      ],
    },
    stats: {
      items: [
        { label: 'Files Created', value: '7', color: 'text-primary' },
        { label: 'Lines of Code', value: '342', color: 'text-secondary' },
        { label: 'Tests Passed', value: '12/12', color: 'text-success' },
      ],
    },
    onClose: () => {
      console.log('Right panel closed');
    },
  });

  // Wire up panel toggle button
  document.getElementById('panelToggle').addEventListener('click', () => {
    rightPanel.open();
  });

  // Initialize ChatInput component
  const chatInput = new ChatInput({
    container: document.getElementById('chatInputContainer'),
    placeholder: 'Send message to Accelerator...',
    tasks: [
      { text: 'Analyze project requirements', status: 'completed' },
      { text: 'Set up React + TypeScript', status: 'completed' },
      { text: 'Deploy and present the landing page', status: 'active' },
    ],
    onSend: (message) => {
      console.log('Sent:', message);
      // Add your send logic here
    },
    onAttachment: () => {
      console.log('Attachment clicked');
    },
    onVoice: () => {
      console.log('Voice clicked');
    },
    onPlus: () => {
      console.log('Plus clicked');
    },
  });

  // Initialize SettingsModal component
  const settingsModal = new SettingsModal({
    container: document.getElementById('settingsModalContainer'),
    currentTheme: 'Light',
    onThemeChange: (theme, themeName) => {
      document.documentElement.setAttribute('data-theme', theme);
      console.log('Theme changed:', themeName);
    },
    onLanguageChange: (lang) => {
      console.log('Language changed:', lang);
    },
    onTimeFormatChange: (format) => {
      console.log('Time format changed:', format);
    },
    onDateFormatChange: (format) => {
      console.log('Date format changed:', format);
    },
    onTimezoneChange: (timezone) => {
      console.log('Timezone changed:', timezone);
    },
  });

  // Wire up settings trigger button
  document.getElementById('settingsTrigger').addEventListener('click', () => {
    settingsModal.open();
  });
</script>
</body>
</html>
